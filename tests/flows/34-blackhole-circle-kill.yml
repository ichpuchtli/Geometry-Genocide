name: "BlackHole Circle Kill No Crash"
tags: [regression, blackhole]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Configure settings: intense phase (lots of blackholes), high spawn rate, many lives
  - action: evalCheck
    description: "Configure settings for BlackHole overload testing"
    script: |
      const settings = JSON.parse(localStorage.getItem('gg_settings') || '{}');
      settings.startingPhase = 'intense';
      settings.startingLives = 99;
      settings.spawnRateMultiplier = 3;
      settings.maxEnemies = 200;
      localStorage.setItem('gg_settings', JSON.stringify(settings));
      return true;

  # Reload to pick up settings
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Start game
  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 200

  # Enable auto-fire and move around to shoot everything
  - action: keyPress
    key: "f"
    duration: 100

  # Move mouse to aim
  - action: mouseMove
    x: 800
    y: 400

  # Play for 15s — BlackHoles should spawn, absorb enemies, overload, spawn circles
  # Circles then get killed by auto-fire bullets — this was the crash path
  - action: keys
    keys: ["w", "d"]
    duration: 3000

  - action: keys
    keys: ["s", "a"]
    duration: 3000

  - action: keys
    keys: ["w", "a"]
    duration: 3000

  - action: keys
    keys: ["s", "d"]
    duration: 3000

  - action: keys
    keys: ["w"]
    duration: 3000

  # Record timestamp before final check
  - action: evalCheck
    description: "Record timestamp for liveness check"
    script: |
      window.__t1 = Date.now();
      return true;

  # Wait a bit more
  - action: wait
    ms: 1000

  # Verify game is still running (not frozen from circle kill crash)
  - action: evalCheck
    description: "Game loop still running — not frozen"
    script: |
      // If game loop crashed, no frames are being rendered
      // We check that the HUD canvas has been drawn recently
      // by comparing timestamps — if game is alive, Date.now() advanced
      const elapsed = Date.now() - window.__t1;
      // At minimum 900ms should have passed (we waited 1000ms)
      // If the game froze, this eval still runs (it's browser-level)
      // but the real test is assertNoErrors below — an uncaught exception
      // from createBuffer(NaN) would be caught by the pageerror handler
      return elapsed > 500;

  - action: screenshot
    name: "34-circle-kill-no-crash"

  - action: assertNoErrors
    description: "No JS errors — circle kills don't crash the game"
