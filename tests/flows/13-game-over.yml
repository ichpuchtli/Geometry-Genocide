name: "Game Over Flow"
tags: [phase2, ui]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Start game
  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 500

  # Press ESC to trigger game over
  - action: keyPress
    key: "Escape"
    duration: 100

  # Wait for death slowmo (4.8s) + game over transition
  - action: wait
    ms: 6000

  - action: evalCheck
    description: "HUD shows game over screen"
    script: |
      var c = document.getElementById('hud');
      if (!c) return false;
      var ctx = c.getContext('2d');
      if (!ctx) return false;
      var cx = Math.floor(c.width / 2);
      var cy = Math.floor(c.height * 0.12);
      var data = ctx.getImageData(cx - 200, cy - 30, 400, 60).data;
      var redPixels = 0;
      for (var i = 0; i < data.length; i += 4) {
        if (data[i] > 200 && data[i+1] < 100 && data[i+2] < 100 && data[i+3] > 0) {
          redPixels++;
        }
      }
      return redPixels > 10;

  - action: screenshot
    name: "13-game-over"

  # Click to restart
  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 500

  - action: screenshot
    name: "13-restarted"

  - action: assertNoErrors
    description: "No errors during game over and restart"
