name: "Zoom Scale Setting"
tags: [smoke, settings]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 2000

  - action: evalCheck
    description: "Zoom slider exists in settings panel"
    script: |
      var ds = document.getElementById('desktop-settings');
      if (!ds) return false;
      var labels = ds.querySelectorAll('.sp-label');
      for (var i = 0; i < labels.length; i++) {
        if (labels[i].textContent === 'Zoom') return true;
      }
      return false;

  - action: evalCheck
    description: "Zoom slider default value is 1.00x"
    script: |
      var ds = document.getElementById('desktop-settings');
      if (!ds) return false;
      var rows = ds.querySelectorAll('.sp-row');
      for (var i = 0; i < rows.length; i++) {
        var label = rows[i].querySelector('.sp-label');
        if (label && label.textContent === 'Zoom') {
          var val = rows[i].querySelector('.sp-value');
          return val && val.textContent === '1.00x';
        }
      }
      return false;

  - action: evalCheck
    description: "Zoom slider description mentions arena"
    script: |
      var ds = document.getElementById('desktop-settings');
      if (!ds) return false;
      var descs = ds.querySelectorAll('.sp-desc');
      for (var i = 0; i < descs.length; i++) {
        if (descs[i].textContent.includes('see more arena')) return true;
      }
      return false;

  - action: evalCheck
    description: "Zoom slider has correct range (0.5-1.5, step 0.05)"
    script: |
      var ds = document.getElementById('desktop-settings');
      if (!ds) return false;
      var sliders = ds.querySelectorAll('input[type="range"]');
      for (var i = 0; i < sliders.length; i++) {
        var s = sliders[i];
        if (s.value === '1' && s.min === '0.5' && s.max === '1.5' && s.step === '0.05') return true;
      }
      return false;

  - action: screenshot
    name: "35-zoom-scale"
