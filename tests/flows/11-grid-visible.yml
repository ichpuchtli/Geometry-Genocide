name: "Background Grid"
tags: [phase2, visual]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Start game
  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 500

  - action: evalCheck
    description: "Game canvas is active and GL context healthy"
    script: |
      var c = document.getElementById('game');
      var gl = c && c.getContext('webgl', {alpha: false, antialias: true});
      return gl && gl.getError() === gl.NO_ERROR && c.width > 0;

  - action: screenshot
    name: "11-grid-visible"

  - action: assertNoErrors
    description: "No errors with grid rendering"
