name: "Start Game"
tags: [smoke, phase1]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 500

  - action: evalCheck
    description: "Game canvas is being rendered (non-black pixels)"
    script: |
      const c = document.getElementById('game');
      const gl = c.getContext('webgl', {alpha: false, antialias: true});
      const pixels = new Uint8Array(4);
      // Sample center of canvas
      gl.readPixels(Math.floor(c.width/2), Math.floor(c.height/2), 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      // After click, game should be running - canvas should have some content
      // Just verify the GL context is still functional
      return gl.getError() === gl.NO_ERROR;

  - action: screenshot
    name: "03-game-started"

  - action: assertNoErrors
    description: "No console errors after game start"
